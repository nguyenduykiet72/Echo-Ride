syntax = "proto3";

package location.v1;

option go_package = "Go-EchoRide/services/location-service/pkg/grpc/generated";

service LocationService {
  rpc FindNearestDrivers(FindNearestDriversRequest) returns (FindNearestDriversResponse);
}

message FindNearestDriversRequest {
  string ride_id = 1;
  double pickup_lat = 2;
  double pickup_lng = 3;
  double radius_km = 4;
  int32 limit = 5;
}

message DriverEtaInfo {
  string driver_id = 1;
  double distance_km = 2;
  double lat = 3;
  double lng = 4;
  int32 eta_seconds = 5;
}

message FindNearestDriversResponse {
  repeated DriverEtaInfo drivers = 1;
}