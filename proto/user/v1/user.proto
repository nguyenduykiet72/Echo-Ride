syntax = "proto3";

package user.v1;

option go_package = "echo-ride/pkg/grpc/user/v1;userv1";

service UserService {
  rpc GetUserAuthInfo(GetUserAuthInfoRequest) returns (GetUserAuthInfoResponse);
}

message GetUserAuthInfoRequest {
  string user_id = 1;
}

message GetUserAuthInfoResponse {
  string role = 1;
  string status = 2;
}
