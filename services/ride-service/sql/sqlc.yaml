version: "2"
sql:
  - engine: "postgresql"
    queries: "./queries/"
    schema: "./migrations/"
    gen:
      go:
        package: "dbgen"
#        out: "./internal/infrastructure/db/dbgen"
        out: "../internal/infrastructure/db/dbgen"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_interface: true
        emit_exact_table_names: false
        rename:
          t_rides: "Ride"