server:
  port: "8112"
  mode: "development"

redis:
  host: "localhost"
  port: 6379
  password: ""
  db: 0

kafka:
  brokers:
    - "localhost:9092"
  topic: "ride.events"
  group_id: "location-service-group"

grpc:
  port: "50052"

jaeger:
  service_host: "localhost"
  service_port: 4317

jwt:
  secret: "mysecretkey"
  expiration_time: 3600

cassandra:
  host: "127.0.0.1"
  keyspace: "echoride_location"

osrm:
  base_url: "http://localhost:5000" # Change to http://echoRide-osrm:5000 if using Docker