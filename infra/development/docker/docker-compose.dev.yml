  postgres:
    image: postgres:17
    container_name: echoRide-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456789
      POSTGRES_DB: echoride_db
    ports:
      - "5441:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d
    networks:
      - echoride_network
#    deploy:
#      resources:
#        limits:
#          cpus: '1.0'
#          memory: 1G
#        reservations:
#          memory: 512M
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d echoride_db" ]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8.0
    container_name: echoRide-redis
#    env_file:
#      - .env
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - echoride_network
    volumes:
      - redis_data:/data

  kafka:
    image: apache/kafka:4.0.0
    hostname: kafka
    container_name: echoRide-kafka
    user: "0:0"
    ports:
      - "9092:9092"
      - "9093:9093"
    environment:
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_NODE_ID: 1
      KAFKA_BROKER_ID: 1
      CLUSTER_ID: "V-P3qjL-S-e6mhj-XB2Oyw"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"

      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      KAFKA_LOG_DIRS: "/tmp/kraft-data"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3
    volumes:
      - kafka_data:/tmp/kraft-data
    networks:
      - echoride_network

volumes:
  postgres_data:
  redis_data:
  kafka_data:

networks:
  echoride_network:
    driver: bridge